<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee & Code Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        :root {
            --coffee-dark: #2C1810;
            --coffee-med: #4A3428;
            --coffee-light: #8B6914;
            --cream: #F4E4C1;
            --yellow: #FFD700;
            --yellow-dark: #B8860B;
            --paper: #FFF8DC;
            --red: #8B0000;
            --green: #228B22;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--coffee-dark);
            color: var(--coffee-dark);
            height: 100vh;
            overflow: hidden;
            font-size: 20px;
        }

        /* Retro Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: var(--cream);
            border-left: 3px solid var(--coffee-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--coffee-light);
            border: 3px solid var(--coffee-dark);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background-color: var(--cream);
            border-right: 4px solid var(--coffee-dark);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 0 rgba(0,0,0,0.2);
        }

        .sidebar-header {
            background-color: var(--coffee-med);
            color: var(--cream);
            padding: 20px;
            border-bottom: 4px solid var(--coffee-dark);
            text-align: center;
        }

        .sidebar-header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            line-height: 1.5;
            text-shadow: 2px 2px 0 var(--coffee-dark);
        }

        .book-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .book-item {
            background-color: var(--paper);
            border: 3px solid var(--coffee-dark);
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 var(--coffee-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .book-item:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--coffee-dark);
            background-color: var(--yellow);
        }

        .book-item.active {
            background-color: var(--yellow);
            box-shadow: 2px 2px 0 var(--coffee-dark) inset;
            transform: translate(2px, 2px);
        }

        .book-item::before {
            content: "📔";
            margin-right: 8px;
            font-size: 16px;
        }

        .book-delete {
            color: var(--red);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
            opacity: 0.6;
        }

        .book-delete:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .add-book-section {
            padding: 15px;
            border-top: 4px solid var(--coffee-dark);
            background-color: var(--coffee-light);
        }

        .pixel-input {
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 8px;
            border: 3px solid var(--coffee-dark);
            background-color: var(--paper);
            width: 100%;
            margin-bottom: 10px;
            outline: none;
            box-shadow: 3px 3px 0 var(--coffee-dark);
        }

        .pixel-input:focus {
            background-color: var(--yellow);
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            background-color: var(--paper);
            display: flex;
            flex-direction: column;
            position: relative;
            background-image: 
                linear-gradient(rgba(139, 105, 20, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 105, 20, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .main-header {
            background-color: var(--coffee-med);
            color: var(--cream);
            padding: 20px;
            border-bottom: 4px solid var(--coffee-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .current-book-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            text-shadow: 2px 2px 0 var(--coffee-dark);
        }

        .stats {
            font-size: 18px;
            color: var(--yellow);
        }

        .task-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .add-task-form {
            background-color: var(--cream);
            border: 4px solid var(--coffee-dark);
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 6px 6px 0 var(--coffee-dark);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .task-input {
            flex: 1;
            min-width: 200px;
        }

        .priority-select {
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 8px;
            border: 3px solid var(--coffee-dark);
            background-color: var(--paper);
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--coffee-dark);
        }

        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 12px 20px;
            background-color: var(--yellow);
            border: 3px solid var(--coffee-dark);
            color: var(--coffee-dark);
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--coffee-dark);
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .pixel-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--coffee-dark);
            background-color: #FFE44D;
        }

        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 var(--coffee-dark);
        }

        .pixel-btn.secondary {
            background-color: var(--coffee-light);
            color: var(--cream);
            font-size: 8px;
            padding: 8px 12px;
        }

        /* Task Items */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background-color: white;
            border: 3px solid var(--coffee-dark);
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 4px 4px 0 var(--coffee-dark);
            position: relative;
            transition: all 0.2s;
        }

        .task-item:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--coffee-dark);
        }

        .task-item.completed {
            opacity: 0.6;
            background-color: #e8e8e8;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #666;
        }

        .priority-badge {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            padding: 6px 8px;
            border: 2px solid var(--coffee-dark);
            color: white;
            min-width: 60px;
            text-align: center;
        }

        .priority-high {
            background-color: var(--red);
            box-shadow: 2px 2px 0 var(--coffee-dark);
        }

        .priority-medium {
            background-color: var(--yellow-dark);
            box-shadow: 2px 2px 0 var(--coffee-dark);
        }

        .priority-low {
            background-color: var(--green);
            box-shadow: 2px 2px 0 var(--coffee-dark);
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 3px solid var(--coffee-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            font-size: 14px;
        }

        .task-checkbox.checked {
            background-color: var(--yellow);
        }

        .task-text {
            flex: 1;
            font-size: 22px;
        }

        .task-delete {
            color: var(--red);
            cursor: pointer;
            font-size: 24px;
            opacity: 0.5;
            transition: all 0.2s;
        }

        .task-delete:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .empty-state {
            text-align: center;
            color: var(--coffee-light);
            padding: 60px;
            font-size: 24px;
            opacity: 0.5;
        }

        .pixel-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .task-item.new {
            animation: popIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>☕ BYTE BOARD</h1>
            </div>
            
            <div class="book-list" id="bookList">
                <!-- Books populated by JS -->
            </div>
            
            <div class="add-book-section">
                <input type="text" class="pixel-input" id="newBookName" placeholder="New Book Name..." maxlength="20">
                <button class="pixel-btn secondary" onclick="addBook()" style="width: 100%;">
                    + Add Book
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="main-header">
                <div class="current-book-title" id="currentBookTitle">Select a Book</div>
                <div class="stats" id="stats">0 tasks</div>
            </div>

            <div class="task-area" id="taskArea">
                <div class="empty-state" id="emptyState">
                    <div class="pixel-icon">📚</div>
                    <p>Select or create a book to start planning!</p>
                </div>

                <div id="taskContainer" style="display: none;">
                    <div class="add-task-form">
                        <input type="text" class="pixel-input task-input" id="taskInput" placeholder="What needs doing?">
                        <select class="priority-select" id="prioritySelect">
                            <option value="3">☕ HIGH</option>
                            <option value="2" selected>🍵 MEDIUM</option>
                            <option value="1">🫖 LOW</option>
                        </select>
                        <button class="pixel-btn" onclick="addTask()">ADD</button>
                    </div>

                    <div class="task-list" id="taskList">
                        <!-- Tasks populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // State Management
        let state = {
            books: [],
            currentBookId: null
        };

        // Initialize
        function init() {
            const saved = localStorage.getItem('coffeePlanner');
            if (saved) {
                state = JSON.parse(saved);
            } else {
                // Default book
                addBook('My First Journal', true);
            }
            renderBooks();
            renderTasks();
        }

        // Save to LocalStorage
        function save() {
            localStorage.setItem('coffeePlanner', JSON.stringify(state));
        }

        // Book Management
        function addBook(name = null, silent = false) {
            const input = document.getElementById('newBookName');
            const bookName = name || input.value.trim();
            
            if (!bookName) return;
            
            const newBook = {
                id: Date.now(),
                name: bookName,
                tasks: [],
                created: new Date().toLocaleDateString()
            };
            
            state.books.push(newBook);
            if (!silent) {
                input.value = '';
                selectBook(newBook.id);
            } else {
                state.currentBookId = newBook.id;
            }
            
            save();
            renderBooks();
        }

        function selectBook(id) {
            state.currentBookId = id;
            renderBooks();
            renderTasks();
        }

        function deleteBook(id, event) {
            event.stopPropagation();
            if (confirm('Delete this book and all its tasks?')) {
                state.books = state.books.filter(b => b.id !== id);
                if (state.currentBookId === id) {
                    state.currentBookId = state.books.length > 0 ? state.books[0].id : null;
                }
                save();
                renderBooks();
                renderTasks();
            }
        }

        // Task Management
        function addTask() {
            if (!state.currentBookId) return;
            
            const input = document.getElementById('taskInput');
            const prioritySelect = document.getElementById('prioritySelect');
            const text = input.value.trim();
            
            if (!text) return;
            
            const book = state.books.find(b => b.id === state.currentBookId);
            const newTask = {
                id: Date.now(),
                text: text,
                priority: parseInt(prioritySelect.value),
                completed: false,
                created: Date.now()
            };
            
            book.tasks.push(newTask);
            input.value = '';
            
            save();
            renderTasks();
        }

        function toggleTask(taskId) {
            const book = state.books.find(b => b.id === state.currentBookId);
            const task = book.tasks.find(t => t.id === taskId);
            task.completed = !task.completed;
            save();
            renderTasks();
        }

        function deleteTask(taskId) {
            const book = state.books.find(b => b.id === state.currentBookId);
            book.tasks = book.tasks.filter(t => t.id !== taskId);
            save();
            renderTasks();
        }

        // Sorting: High priority first, completed last
        function sortTasks(tasks) {
            return tasks.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                return b.priority - a.priority;
            });
        }

        // Rendering
        function renderBooks() {
            const list = document.getElementById('bookList');
            list.innerHTML = '';
            
            state.books.forEach(book => {
                const div = document.createElement('div');
                div.className = `book-item ${book.id === state.currentBookId ? 'active' : ''}`;
                div.onclick = () => selectBook(book.id);
                
                div.innerHTML = `
                    <span>${book.name}</span>
                    <span class="book-delete" onclick="deleteBook(${book.id}, event)">×</span>
                `;
                
                list.appendChild(div);
            });
        }

        function renderTasks() {
            const emptyState = document.getElementById('emptyState');
            const container = document.getElementById('taskContainer');
            const list = document.getElementById('taskList');
            const title = document.getElementById('currentBookTitle');
            const stats = document.getElementById('stats');
            
            if (!state.currentBookId) {
                emptyState.style.display = 'block';
                container.style.display = 'none';
                title.textContent = 'Select a Book';
                stats.textContent = '0 tasks';
                return;
            }
            
            const book = state.books.find(b => b.id === state.currentBookId);
            title.textContent = book.name;
            
            const completedCount = book.tasks.filter(t => t.completed).length;
            stats.textContent = `${completedCount}/${book.tasks.length} done`;
            
            emptyState.style.display = 'none';
            container.style.display = 'block';
            
            list.innerHTML = '';
            
            const sortedTasks = sortTasks([...book.tasks]);
            
            if (sortedTasks.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="padding: 40px;">
                        <div class="pixel-icon">📝</div>
                        <p>No tasks yet! Add one above ☕</p>
                    </div>
                `;
                return;
            }
            
            sortedTasks.forEach(task => {
                const priorityLabels = {3: 'HIGH', 2: 'MED', 1: 'LOW'};
                const priorityClass = {3: 'high', 2: 'medium', 1: 'low'};
                
                const div = document.createElement('div');
                div.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                div.innerHTML = `
                    <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
                        ${task.completed ? '✓' : ''}
                    </div>
                    <span class="priority-badge priority-${priorityClass[task.priority]}">
                        ${priorityLabels[task.priority]}
                    </span>
                    <span class="task-text">${escapeHtml(task.text)}</span>
                    <span class="task-delete" onclick="deleteTask(${task.id})">×</span>
                `;
                
                list.appendChild(div);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event Listeners
        document.getElementById('newBookName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addBook();
        });

        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Start
        init();
    </script>
</body>
</html>
